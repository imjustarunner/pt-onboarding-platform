          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          REFERRAL_KMS_KEY: ${{ secrets.REFERRAL_KMS_KEY }}
          DOCUMENTS_KMS_KEY: ${{ secrets.DOCUMENTS_KMS_KEY }}
          ADMIN_ACTIONS_TOKEN: ${{ secrets.ADMIN_ACTIONS_TOKEN }}
