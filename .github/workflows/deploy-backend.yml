          VERTEX_AI_LOCATION: ${{ secrets.VERTEX_AI_LOCATION }}
          VERTEX_AI_MODEL: ${{ secrets.VERTEX_AI_MODEL }}
          VERTEX_AI_RESEARCH_MODEL: ${{ secrets.VERTEX_AI_RESEARCH_MODEL }}
          VERTEX_AI_RESEARCH_TIMEOUT_MS: ${{ secrets.VERTEX_AI_RESEARCH_TIMEOUT_MS }}
          VERTEX_AI_RESEARCH_MAX_OUTPUT_TOKENS: ${{ secrets.VERTEX_AI_RESEARCH_MAX_OUTPUT_TOKENS }}
          ADK_AGENT_URL: ${{ secrets.ADK_AGENT_URL }}
          VERTEX_AI_AGENT_TIMEOUT_MS: ${{ secrets.VERTEX_AI_AGENT_TIMEOUT_MS }}
          VERTEX_AGENT_ENGINE_ID: ${{ secrets.VERTEX_AGENT_ENGINE_ID }}
          VERTEX_AI_AGENT_MODEL: ${{ secrets.VERTEX_AI_AGENT_MODEL }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
