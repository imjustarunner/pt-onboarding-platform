          if [ -n "${DEMO_MODE_FAKE_AGENCY_IDS}" ]; then ENV_VARS="${ENV_VARS}|DEMO_MODE_FAKE_AGENCY_IDS=${DEMO_MODE_FAKE_AGENCY_IDS}"; fi
