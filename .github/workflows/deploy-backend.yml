name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'  # ADDED: Now triggers when you fix frontend files too
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: onboarding-backend
  REGION: us-west3
  IMAGE_NAME: us-west3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/onboarding-backend/onboarding-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-west3-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          # DEBUG: Print the Admin folder to confirm the file exists and check casing
          echo "=== DEBUG: Checking Admin Component Folder ==="
          ls -R frontend/src/components/admin/ || echo "Folder not found"
          echo "=============================================="
          echo "=== DEBUG: Frontend entry + config ==="
          ls -la frontend/index.html frontend/vite.config.js || true
          echo "======================================"

          # Build the Docker image
          # Note: We build from root context (.) because backend Dockerfile needs access to frontend folder
          docker build -f backend/Dockerfile \
            --build-arg VITE_API_URL="/api" \
            -t $IMAGE_NAME:$GITHUB_SHA \
            -t $IMAGE_NAME:latest .

          # Push to Google Artifact Registry
          docker push $IMAGE_NAME:$GITHUB_SHA
          docker push $IMAGE_NAME:latest

      - name: Deploy to Cloud Run
        env:
          CLIENT_CHAT_ENCRYPTION_KEY_ID: ${{ secrets.CLIENT_CHAT_ENCRYPTION_KEY_ID }}
          CLIENT_CHAT_ENCRYPTION_KEY_BASE64: ${{ secrets.CLIENT_CHAT_ENCRYPTION_KEY_BASE64 }}
          CLOUD_SQL_CONNECTION_NAME: ${{ secrets.CLOUD_SQL_CONNECTION_NAME }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_CONNECTION_LIMIT: ${{ secrets.DB_CONNECTION_LIMIT }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
          GOOGLE_WORKSPACE_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_WORKSPACE_SERVICE_ACCOUNT_JSON_BASE64 }}
          GOOGLE_WORKSPACE_IMPERSONATE_USER: ${{ secrets.GOOGLE_WORKSPACE_IMPERSONATE_USER }}
          GOOGLE_WORKSPACE_DRIVE_IMPERSONATE_USER: ${{ secrets.GOOGLE_WORKSPACE_DRIVE_IMPERSONATE_USER }}
          GMAIL_IMPERSONATE_USER: ${{ secrets.GMAIL_IMPERSONATE_USER }}
          GOOGLE_WORKSPACE_FROM_NAME: ${{ secrets.GOOGLE_WORKSPACE_FROM_NAME }}
          GOOGLE_WORKSPACE_FROM_ADDRESS: ${{ secrets.GOOGLE_WORKSPACE_FROM_ADDRESS }}
          GOOGLE_WORKSPACE_DEFAULT_FROM: ${{ secrets.GOOGLE_WORKSPACE_DEFAULT_FROM }}
          GOOGLE_WORKSPACE_REPLY_TO: ${{ secrets.GOOGLE_WORKSPACE_REPLY_TO }}
          EXPENSE_RECEIPTS_DRIVE_FOLDER_ID: ${{ secrets.EXPENSE_RECEIPTS_DRIVE_FOLDER_ID }}
          RECAPTCHA_SITE_KEY: ${{ secrets.RECAPTCHA_SITE_KEY }}
          RECAPTCHA_ENTERPRISE_API_KEY: ${{ secrets.RECAPTCHA_ENTERPRISE_API_KEY }}
          RECAPTCHA_ENTERPRISE_PROJECT_ID: ${{ secrets.RECAPTCHA_ENTERPRISE_PROJECT_ID }}
          RECAPTCHA_ENTERPRISE_USE_ADC: ${{ secrets.RECAPTCHA_ENTERPRISE_USE_ADC }}
          RECAPTCHA_SECRET_KEY: ${{ secrets.RECAPTCHA_SECRET_KEY }}
          RECAPTCHA_MIN_SCORE: ${{ secrets.RECAPTCHA_MIN_SCORE }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REDIRECT_URI: ${{ secrets.GOOGLE_OAUTH_REDIRECT_URI }}
          GOOGLE_OAUTH_ALLOWED_REDIRECT_HOSTS: ${{ secrets.GOOGLE_OAUTH_ALLOWED_REDIRECT_HOSTS }}
          GOOGLE_OAUTH_STATE_SECRET: ${{ secrets.GOOGLE_OAUTH_STATE_SECRET }}
          EMAIL_AI_STATUS_DRAFTS_ENABLED: ${{ secrets.EMAIL_AI_STATUS_DRAFTS_ENABLED }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
