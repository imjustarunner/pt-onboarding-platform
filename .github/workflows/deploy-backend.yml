          if [ -n "${BILLING_JOB_SECRET}" ]; then ENV_VARS="${ENV_VARS}|BILLING_JOB_SECRET=${BILLING_JOB_SECRET}"; fi
          if [ -n "${BILLING_ENCRYPTION_KEY_BASE64}" ]; then ENV_VARS="${ENV_VARS}|BILLING_ENCRYPTION_KEY_BASE64=${BILLING_ENCRYPTION_KEY_BASE64}"; fi
          if [ -n "${BILLING_ENCRYPTION_KEY_ID}" ]; then ENV_VARS="${ENV_VARS}|BILLING_ENCRYPTION_KEY_ID=${BILLING_ENCRYPTION_KEY_ID}"; fi
          if [ -n "${VAPID_PUBLIC_KEY}" ]; then ENV_VARS="${ENV_VARS}|VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}"; fi
          if [ -n "${REFERRAL_KMS_KEY}" ]; then ENV_VARS="${ENV_VARS}|REFERRAL_KMS_KEY=${REFERRAL_KMS_KEY}"; fi
          if [ -n "${DOCUMENTS_KMS_KEY}" ]; then ENV_VARS="${ENV_VARS}|DOCUMENTS_KMS_KEY=${DOCUMENTS_KMS_KEY}"; fi
          if [ -n "${ADMIN_ACTIONS_TOKEN}" ]; then ENV_VARS="${ENV_VARS}|ADMIN_ACTIONS_TOKEN=${ADMIN_ACTIONS_TOKEN}"; fi
          if [ -n "${GEMINI_API_KEY}" ]; then ENV_VARS="${ENV_VARS}|GEMINI_API_KEY=${GEMINI_API_KEY}"; fi
          if [ -n "${GEMINI_FORCE_API_KEY}" ]; then ENV_VARS="${ENV_VARS}|GEMINI_FORCE_API_KEY=${GEMINI_FORCE_API_KEY}"; fi
          if [ -n "${GEMINI_MODEL}" ]; then ENV_VARS="${ENV_VARS}|GEMINI_MODEL=${GEMINI_MODEL}"; fi
          if [ -n "${VERTEX_AUTH_SOURCE}" ]; then ENV_VARS="${ENV_VARS}|VERTEX_AUTH_SOURCE=${VERTEX_AUTH_SOURCE}"; fi
          if [ -n "${VERTEX_AI_LOCATION}" ]; then ENV_VARS="${ENV_VARS}|VERTEX_AI_LOCATION=${VERTEX_AI_LOCATION}"; fi
          if [ -n "${VERTEX_AI_MODEL}" ]; then ENV_VARS="${ENV_VARS}|VERTEX_AI_MODEL=${VERTEX_AI_MODEL}"; fi
          if [ -n "${VERTEX_AI_RESEARCH_MODEL}" ]; then ENV_VARS="${ENV_VARS}|VERTEX_AI_RESEARCH_MODEL=${VERTEX_AI_RESEARCH_MODEL}"; fi
          if [ -n "${VERTEX_AI_RESEARCH_TIMEOUT_MS}" ]; then ENV_VARS="${ENV_VARS}|VERTEX_AI_RESEARCH_TIMEOUT_MS=${VERTEX_AI_RESEARCH_TIMEOUT_MS}"; fi
          if [ -n "${VERTEX_AI_RESEARCH_MAX_OUTPUT_TOKENS}" ]; then ENV_VARS="${ENV_VARS}|VERTEX_AI_RESEARCH_MAX_OUTPUT_TOKENS=${VERTEX_AI_RESEARCH_MAX_OUTPUT_TOKENS}"; fi
          if [ -n "${ADK_AGENT_URL}" ]; then ENV_VARS="${ENV_VARS}|ADK_AGENT_URL=${ADK_AGENT_URL}"; fi
          if [ -n "${VERTEX_AI_AGENT_TIMEOUT_MS}" ]; then ENV_VARS="${ENV_VARS}|VERTEX_AI_AGENT_TIMEOUT_MS=${VERTEX_AI_AGENT_TIMEOUT_MS}"; fi
          if [ -n "${VERTEX_AGENT_ENGINE_ID}" ]; then ENV_VARS="${ENV_VARS}|VERTEX_AGENT_ENGINE_ID=${VERTEX_AGENT_ENGINE_ID}"; fi
          if [ -n "${VERTEX_AI_AGENT_MODEL}" ]; then ENV_VARS="${ENV_VARS}|VERTEX_AI_AGENT_MODEL=${VERTEX_AI_AGENT_MODEL}"; fi
          if [ -n "${PROJECT_ID}" ]; then ENV_VARS="${ENV_VARS}|PROJECT_ID=${PROJECT_ID}"; fi
          if [ -n "${VIRUSTOTAL_API_KEY}" ]; then ENV_VARS="${ENV_VARS}|VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}"; fi
          if [ -n "${CLINICAL_KB_PREFIX}" ]; then ENV_VARS="${ENV_VARS}|CLINICAL_KB_PREFIX=${CLINICAL_KB_PREFIX}"; fi
          if [ -n "${EMAIL_SENDING_MODE}" ]; then ENV_VARS="${ENV_VARS}|EMAIL_SENDING_MODE=${EMAIL_SENDING_MODE}"; fi
          if [ -n "${QUICKBOOKS_CLIENT_ID}" ]; then ENV_VARS="${ENV_VARS}|QUICKBOOKS_CLIENT_ID=${QUICKBOOKS_CLIENT_ID}"; fi
          if [ -n "${QUICKBOOKS_CLIENT_SECRET}" ]; then ENV_VARS="${ENV_VARS}|QUICKBOOKS_CLIENT_SECRET=${QUICKBOOKS_CLIENT_SECRET}"; fi
          if [ -n "${QUICKBOOKS_REDIRECT_URI}" ]; then ENV_VARS="${ENV_VARS}|QUICKBOOKS_REDIRECT_URI=${QUICKBOOKS_REDIRECT_URI}"; fi
          if [ -n "${QUICKBOOKS_OAUTH_STATE_SECRET}" ]; then ENV_VARS="${ENV_VARS}|QUICKBOOKS_OAUTH_STATE_SECRET=${QUICKBOOKS_OAUTH_STATE_SECRET}"; fi
          if [ -n "${QUICKBOOKS_ENV}" ]; then ENV_VARS="${ENV_VARS}|QUICKBOOKS_ENV=${QUICKBOOKS_ENV}"; fi
          if [ -n "${QBO_VENDOR_DISPLAY_NAME}" ]; then ENV_VARS="${ENV_VARS}|QBO_VENDOR_DISPLAY_NAME=${QBO_VENDOR_DISPLAY_NAME}"; fi

          # Remove ALL vars that may have been set as Secret Manager refs, so we can use plain env vars from GitHub.
          # Must be separate from deploy: cannot remove-secrets and update-env-vars same key in one command.
          REMOVE_SECRETS="DB_USER,DB_PASSWORD,CLINICAL_DB_USER,CLINICAL_DB_PASSWORD,JWT_SECRET,JWT_EXPIRES_IN,CLIENT_CHAT_ENCRYPTION_KEY_ID,CLIENT_CHAT_ENCRYPTION_KEY_BASE64,GOOGLE_WORKSPACE_SERVICE_ACCOUNT_JSON_BASE64,GOOGLE_MAPS_API_KEY,RECAPTCHA_SITE_KEY,RECAPTCHA_SECRET_KEY,RECAPTCHA_ENTERPRISE_API_KEY,RECAPTCHA_ENTERPRISE_PROJECT_ID,GOOGLE_OAUTH_CLIENT_ID,GOOGLE_OAUTH_CLIENT_SECRET,GOOGLE_OAUTH_REDIRECT_URI,GOOGLE_OAUTH_STATE_SECRET,GEMINI_API_KEY,TWILIO_ACCOUNT_SID,TWILIO_AUTH_TOKEN,TWILIO_API_KEY_SID,TWILIO_API_KEY_SECRET,META_APP_ID,META_APP_SECRET,LEARNING_BILLING_RENEWAL_SECRET,BILLING_JOB_SECRET,BILLING_ENCRYPTION_KEY_BASE64,BILLING_ENCRYPTION_KEY_ID,VAPID_PUBLIC_KEY,REFERRAL_KMS_KEY,DOCUMENTS_KMS_KEY,ADMIN_ACTIONS_TOKEN,VIRUSTOTAL_API_KEY,QUICKBOOKS_CLIENT_ID,QUICKBOOKS_CLIENT_SECRET,QUICKBOOKS_OAUTH_STATE_SECRET"
          gcloud run services update $SERVICE_NAME --region $REGION --remove-secrets="${REMOVE_SECRETS}" 2>/dev/null || true

          gcloud run deploy $SERVICE_NAME \
            --image $IMAGE_NAME:$GITHUB_SHA \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --service-account ${CLOUD_RUN_SA_EMAIL} \
            --add-cloudsql-instances=${CLOUD_SQL_CONNECTION_NAME} \
            --update-env-vars="${ENV_VARS}" \
            --memory=2Gi \
            --cpu=1 \
            --cpu-boost \
            --timeout=300 \
            --max-instances=10 \
            --min-instances=0 \
            --startup-probe=httpGet.path=/health,httpGet.port=8080,initialDelaySeconds=60,failureThreshold=18,periodSeconds=10,timeoutSeconds=5

          # IMPORTANT: if traffic was pinned to an older revision, explicitly promote the latest revision.
          gcloud run services update-traffic $SERVICE_NAME \
            --region $REGION \
            --to-latest

      - name: Verify env vars on Cloud Run
        run: |
          echo "=== Env vars deployed to Cloud Run (names only) ==="
          gcloud run services describe $SERVICE_NAME --region $REGION --format=json \
            | jq -r '.spec.template.spec.containers[0].env[]?.name // empty' 2>/dev/null | sort || echo "(run 'gcloud run services describe onboarding-backend --region us-west3 --format=json' locally to inspect)"
          echo "=== Compare to .github/DEPLOY_SECRETS_CHECKLIST.md ==="
