          CLINICAL_KB_PREFIX: ${{ secrets.CLINICAL_KB_PREFIX }}
          EMAIL_SENDING_MODE: ${{ secrets.EMAIL_SENDING_MODE }}
          QUICKBOOKS_CLIENT_ID: ${{ secrets.QUICKBOOKS_CLIENT_ID }}
          QUICKBOOKS_CLIENT_SECRET: ${{ secrets.QUICKBOOKS_CLIENT_SECRET }}
          QUICKBOOKS_REDIRECT_URI: ${{ secrets.QUICKBOOKS_REDIRECT_URI }}
          QUICKBOOKS_OAUTH_STATE_SECRET: ${{ secrets.QUICKBOOKS_OAUTH_STATE_SECRET }}
          QUICKBOOKS_ENV: ${{ secrets.QUICKBOOKS_ENV }}
          QBO_VENDOR_DISPLAY_NAME: ${{ secrets.QBO_VENDOR_DISPLAY_NAME }}
          CLOUD_RUN_SA_EMAIL: ${{ secrets.CLOUD_RUN_SA_EMAIL }}
        run: |
          # Build env var list safely. Use update-env-vars so we don't accidentally wipe
          # existing Cloud Run configuration that isn't specified here.
          # Use a custom delimiter to avoid comma-escaping in values.
          # This lets CORS_ORIGIN contain commas safely.
          # Secrets are passed via env block to avoid shell expansion of special chars.
          ENV_VARS="^|^NODE_ENV=production"
          ENV_VARS="${ENV_VARS}|NODE_OPTIONS=--max-old-space-size=1536"
          ENV_VARS="${ENV_VARS}|CORS_ORIGIN=https://plottwisthq.com,https://www.plottwisthq.com,https://onboarding-frontend-378990906760.us-west3.run.app,https://app.itsco.health,https://app.nextleveluplcc.com,https://app.mh4kidz.com,https://app.plottwistco.com,https://app.mentalrange.org,https://app.rockymountainmentors.org,https://app.risereviveco.com,https://app.rmmentors.com,https://app.theinnerstrengthinstitute.com"
          ENV_VARS="${ENV_VARS}|FRONTEND_URL=https://plottwisthq.com"
          ENV_VARS="${ENV_VARS}|DB_HOST=/cloudsql/${CLOUD_SQL_CONNECTION_NAME}"
          ENV_VARS="${ENV_VARS}|DB_PORT=3306"
          ENV_VARS="${ENV_VARS}|DB_NAME=onboarding_stage"
          if [ -n "${DB_USER}" ]; then ENV_VARS="${ENV_VARS}|DB_USER=${DB_USER}"; fi
          if [ -n "${DB_PASSWORD}" ]; then ENV_VARS="${ENV_VARS}|DB_PASSWORD=${DB_PASSWORD}"; fi
          if [ -n "${DB_CONNECTION_LIMIT}" ]; then ENV_VARS="${ENV_VARS}|DB_CONNECTION_LIMIT=${DB_CONNECTION_LIMIT}"; fi

          # JWT (required for auth).
          if [ -n "${JWT_SECRET}" ]; then ENV_VARS="${ENV_VARS}|JWT_SECRET=${JWT_SECRET}"; fi
          if [ -n "${JWT_EXPIRES_IN}" ]; then ENV_VARS="${ENV_VARS}|JWT_EXPIRES_IN=${JWT_EXPIRES_IN}"; fi
          ENV_VARS="${ENV_VARS}|STORAGE_TYPE=gcs"
          ENV_VARS="${ENV_VARS}|GCS_PROJECT_ID=${GCP_PROJECT_ID}"
          ENV_VARS="${ENV_VARS}|GCS_BUCKET_NAME=${GCS_BUCKET_NAME}"
          ENV_VARS="${ENV_VARS}|PTONBOARDFILES=${GCS_BUCKET_NAME}"

          if [ -n "${CLIENT_CHAT_ENCRYPTION_KEY_ID}" ]; then ENV_VARS="${ENV_VARS}|CLIENT_CHAT_ENCRYPTION_KEY_ID=${CLIENT_CHAT_ENCRYPTION_KEY_ID}"; fi
