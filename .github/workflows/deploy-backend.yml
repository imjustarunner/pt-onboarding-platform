          if [ -n "${GOOGLE_WORKSPACE_SERVICE_ACCOUNT_JSON_BASE64}" ]; then ENV_VARS="${ENV_VARS}|GOOGLE_WORKSPACE_SERVICE_ACCOUNT_JSON_BASE64=${GOOGLE_WORKSPACE_SERVICE_ACCOUNT_JSON_BASE64}"; fi
          if [ -n "${GOOGLE_WORKSPACE_IMPERSONATE_USER}" ]; then ENV_VARS="${ENV_VARS}|GOOGLE_WORKSPACE_IMPERSONATE_USER=${GOOGLE_WORKSPACE_IMPERSONATE_USER}"; fi
          if [ -n "${GOOGLE_WORKSPACE_DRIVE_IMPERSONATE_USER}" ]; then ENV_VARS="${ENV_VARS}|GOOGLE_WORKSPACE_DRIVE_IMPERSONATE_USER=${GOOGLE_WORKSPACE_DRIVE_IMPERSONATE_USER}"; fi
          if [ -n "${GMAIL_IMPERSONATE_USER}" ]; then ENV_VARS="${ENV_VARS}|GMAIL_IMPERSONATE_USER=${GMAIL_IMPERSONATE_USER}"; fi
          if [ -n "${GOOGLE_WORKSPACE_FROM_NAME}" ]; then ENV_VARS="${ENV_VARS}|GOOGLE_WORKSPACE_FROM_NAME=${GOOGLE_WORKSPACE_FROM_NAME}"; fi
          if [ -n "${GOOGLE_WORKSPACE_FROM_ADDRESS}" ]; then ENV_VARS="${ENV_VARS}|GOOGLE_WORKSPACE_FROM_ADDRESS=${GOOGLE_WORKSPACE_FROM_ADDRESS}"; fi
          if [ -n "${GOOGLE_WORKSPACE_DEFAULT_FROM}" ]; then ENV_VARS="${ENV_VARS}|GOOGLE_WORKSPACE_DEFAULT_FROM=${GOOGLE_WORKSPACE_DEFAULT_FROM}"; fi
          if [ -n "${GOOGLE_WORKSPACE_REPLY_TO}" ]; then ENV_VARS="${ENV_VARS}|GOOGLE_WORKSPACE_REPLY_TO=${GOOGLE_WORKSPACE_REPLY_TO}"; fi
          if [ -n "${EXPENSE_RECEIPTS_DRIVE_FOLDER_ID}" ]; then ENV_VARS="${ENV_VARS}|EXPENSE_RECEIPTS_DRIVE_FOLDER_ID=${EXPENSE_RECEIPTS_DRIVE_FOLDER_ID}"; fi
          if [ -n "${RECAPTCHA_SITE_KEY}" ]; then ENV_VARS="${ENV_VARS}|RECAPTCHA_SITE_KEY=${RECAPTCHA_SITE_KEY}"; fi
          if [ -n "${RECAPTCHA_ENTERPRISE_API_KEY}" ]; then ENV_VARS="${ENV_VARS}|RECAPTCHA_ENTERPRISE_API_KEY=${RECAPTCHA_ENTERPRISE_API_KEY}"; fi
